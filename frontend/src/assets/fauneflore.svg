<svg width="600" height="500" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond -->
  <circle cx="300" cy="250" r="220" fill="#ECFDF5"/>
  <ellipse cx="300" cy="440" rx="240" ry="14" fill="#D1D5DB" opacity="0.4"/>

  <!-- Collines de fond -->
  <path d="M0 340 C120 300 200 320 300 300 C400 280 480 310 600 290 L600 460 L0 460 Z" fill="#D8F3DC"/>
  <path d="M0 380 C140 355 260 370 360 350 C450 332 520 350 600 335 L600 460 L0 460 Z" fill="#B7E4C7"/>

  <!-- Grands arbres (flore) -->
  <g>
    <rect x="66" y="230" width="12" height="130" rx="6" fill="#1B4332"/>
    <circle cx="72" cy="170" r="58" fill="#2D6A4F"/>
    <circle cx="40" cy="205" r="38" fill="#40916C"/>
    <circle cx="108" cy="205" r="40" fill="#2D6A4F"/>
  </g>
  <g>
    <rect x="520" y="250" width="10" height="110" rx="5" fill="#1B4332"/>
    <circle cx="525" cy="205" r="46" fill="#40916C"/>
    <circle cx="500" cy="230" r="30" fill="#2D6A4F"/>
  </g>

  <!-- Feuilles de palmier / ravenala stylisé -->
  <g fill="#2D6A4F">
    <path d="M150 360 C130 320 130 280 150 250 C160 290 160 330 150 360 Z"/>
    <path d="M150 360 C170 320 180 285 205 260 C195 300 180 335 150 360 Z"/>
    <path d="M150 360 C110 335 90 305 85 270 C115 295 140 325 150 360 Z"/>
  </g>
  <rect x="147" y="358" width="8" height="30" fill="#1B4332"/>

  <!-- Caméléon (faune) sur une branche -->
  <g transform="translate(150,300)">
    <path d="M-40 10 C-10 -6 20 -6 46 8" stroke="#111111" stroke-width="4" fill="none" stroke-linecap="round"/>
    <ellipse cx="30" cy="6" rx="26" ry="16" fill="#40916C"/>
    <path d="M50 2 C60 -6 66 -2 60 6 C66 12 60 16 50 10 Z" fill="#2D6A4F"/>
    <circle cx="54" cy="0" r="3.5" fill="#0A0A0A"/>
    <path d="M10 18 C4 26 -2 30 -10 30" stroke="#2D6A4F" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M46 18 C50 26 46 32 40 34" stroke="#2D6A4F" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Oiseau (faune) en vol -->
  <g transform="translate(430,110)">
    <path d="M0 10 C10 -4 24 -4 32 8 C24 4 12 6 6 14 C14 12 24 14 30 20 C18 20 6 18 0 10 Z" fill="#1B4332"/>
    <circle cx="30" cy="9" r="3" fill="#0A0A0A"/>
  </g>
  <g transform="translate(470,140) scale(0.7)">
    <path d="M0 10 C10 -4 24 -4 32 8 C24 4 12 6 6 14 C14 12 24 14 30 20 C18 20 6 18 0 10 Z" fill="#2D6A4F"/>
  </g>

  <!-- Lémurien assis (faune) -->
  <g transform="translate(230,330)">
    <ellipse cx="0" cy="30" rx="26" ry="34" fill="#111111"/>
    <ellipse cx="0" cy="34" rx="16" ry="22" fill="#FFFFFF"/>
    <circle cx="0" cy="-10" r="22" fill="#111111"/>
    <circle cx="-9" cy="-13" r="7" fill="#FFFFFF"/>
    <circle cx="9" cy="-13" r="7" fill="#FFFFFF"/>
    <circle cx="-9" cy="-13" r="3" fill="#0A0A0A"/>
    <circle cx="9" cy="-13" r="3" fill="#0A0A0A"/>
    <ellipse cx="0" cy="-2" rx="6" ry="4" fill="#FFFFFF"/>
    <!-- queue rayée -->
    <path d="M22 40 C50 40 55 10 40 -6" stroke="#111111" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M22 40 C50 40 55 10 40 -6" stroke="#FFFFFF" stroke-width="10" fill="none" stroke-dasharray="6 8" stroke-linecap="round"/>
  </g>

  <!-- Panneau de gestion / tablette terrain (gestion) -->
  <g transform="translate(330,190)">
    <rect x="0" y="0" width="150" height="190" rx="14" fill="#0A0A0A"/>
    <rect x="10" y="14" width="130" height="150" rx="6" fill="#FFFFFF"/>

    <!-- en-tête app -->
    <rect x="20" y="26" width="14" height="14" rx="4" fill="#1B4332"/>
    <rect x="40" y="29" width="60" height="7" rx="3" fill="#111111"/>

    <!-- checklist gestion -->
    <circle cx="26" cy="60" r="7" fill="#1B4332"/>
    <path d="M22 60 l3 3 l6 -6" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="40" y="56" width="80" height="6" rx="3" fill="#A8A29E"/>

    <circle cx="26" cy="82" r="7" fill="#1B4332"/>
    <path d="M22 82 l3 3 l6 -6" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="40" y="78" width="65" height="6" rx="3" fill="#A8A29E"/>

    <circle cx="26" cy="104" r="7" fill="#D8F3DC" stroke="#1B4332" stroke-width="2"/>
    <rect x="40" y="100" width="72" height="6" rx="3" fill="#D6D3D1"/>

    <!-- mini graphique en bas de la tablette -->
    <rect x="20" y="122" width="110" height="34" rx="4" fill="#ECFDF5"/>
    <polyline points="26,148 44,136 60,142 78,124 96,132 114,120" fill="none" stroke="#1B4332" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Agent de terrain tenant la tablette (gestion) -->
  <g transform="translate(300,250)">
    <circle cx="0" cy="0" r="30" fill="#111111"/>
    <path d="M-30 0 a30 30 0 0 1 60 0 v8 h-60 z" fill="#0A0A0A"/>
    <path d="M-40 60 C-40 24 -14 22 8 22 C34 22 58 26 60 64 L68 150 C68 164 56 170 42 170 L-24 170 C-38 170 -46 162 -44 150 Z" fill="#2D6A4F"/>
    <path d="M52 40 C66 44 72 56 66 66 L52 60 Z" fill="#2D6A4F"/>
  </g>

  <!-- Empreinte animale au sol (gestion terrain) -->
  <g fill="#1B4332" opacity="0.8">
    <ellipse cx="480" cy="380" rx="9" ry="13"/>
    <ellipse cx="463" cy="366" rx="4.5" ry="6.5"/>
    <ellipse cx="476" cy="358" rx="4.5" ry="6.5"/>
    <ellipse cx="491" cy="360" rx="4.5" ry="6.5"/>
    <ellipse cx="503" cy="369" rx="4.5" ry="6.5"/>
  </g>

  <!-- Feuille flottante décorative -->
  <path d="M60 90 C80 90 90 108 82 126 C74 144 52 144 44 126 C36 108 40 90 60 90 Z" fill="#40916C" opacity="0.8" transform="rotate(20 60 108)"/>
</svg>
